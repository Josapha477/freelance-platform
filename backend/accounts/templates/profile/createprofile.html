
{% extends 'base.html' %}

{% load static %}

{% block title %}creation profile{% endblock %}

{% block extra_css %}

{% endblock %}

{% block content %}

 <div class="mx-auto font-bold w-full ">
     <div class="bg-white rounded-lg shadow-md p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Creer votre profile</h2>
            <form class="grid md:grid-cols-2 lg:grid-cols-3 md:space-x-2" method="POST">
                        {% csrf_token %}
                
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                                photo de profile
                    </label>
                    <input type="file" name="avatar"
                                class="w-full px-3 py-2 border border-gray-300 
                                rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                               Prenom
                    </label>
                    <input type="text" required name = "first_name"
                                class="w-full px-3 py-2 border border-gray-300 
                                rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                 </div>

                 <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                               Nom
                    </label>
                    <input type="text" required name = "last_name"
                                class="w-full px-3 py-2 border border-gray-300 
                                rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                 </div>
                 
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                                Numero de telephone
                    </label>
                    <input type="number" required name = "phone"
                                class="w-full px-3 py-2 border border-gray-300 
                                rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2">
                                Pays
                        </label>
                        <input type="text" name = "country" value="HAITI"
                                class="w-full px-3 py-2 border border-gray-300 
                                rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                    

                <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2">
                               Vous avez une Company
                        </label>
                        <input type="text" required name = "company" placeholder="Peut-être vide"
                                class="w-full px-3 py-2 border border-gray-300 
                                rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                 <div class="mb-6">
                            <label class="block text-gray-700 text-sm font-bold mb-2">
                                Vous avez une Entreprise
                            </label>
                            <input type="text" required name = "industry" placeholder="Peut-être vide"
                                class="w-full px-3 py-2 border border-gray-300 
                                rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                        {% if form.error %}
                        <div class="border border-red-400 text-red-700 rounded">
                           {{ error }}
                        </div>
                        {% endif %}

                <div class="flex items-center justify-center ">
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md">
                            Enregistrer
                        </button>
                </div>

                    </form>
                    <p class="mt-4 text-center text-sm text-gray-600">
                        <a href="/" class="text-indigo-600 hover:text-indigo-800 font-medium">
                            Retour
                        </a>
                    </p>
                </div>
            </div>


{% endblock %}
